<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Next-Gen Hyper HD Racing Engine</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, sans-serif;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* Next-Gen Holographic HUD Dashboard */
        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #ffffff;
            z-index: 10;
            background: rgba(10, 15, 30, 0.75);
            padding: 24px 35px;
            border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.25);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4), inset 0 0 15px rgba(0,229,255,0.1);
        }
        .hud-item { margin-bottom: 12px; }
        .hud-label {
            font-size: 10px;
            color: #00e5ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .hud-val {
            font-family: monospace;
            color: #ffffff;
            font-size: 32px;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        #hp-container {
            width: 160px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 6px;
        }
        #hp-bar {
            width: 100%; height: 100%; background: linear-gradient(90deg, #00ff66, #00ffcc); transition: width 0.1s ease;
        }

        /* Top Bar System Switches */
        .system-menu {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
            display: flex;
            gap: 15px;
        }
        .sys-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #111;
            padding: 14px 24px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 13px;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }
        .sys-btn:active { transform: scale(0.95); }
        #weather-btn { background: #111; color: #00e5ff; border: 1px solid #00e5ff; }

        /* Impact Screen Flash Effect Overlay */
        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,0,85,0) 30%, rgba(255,0,85,0.6) 100%);
            pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.05s linear;
        }

        /* AAA Game Cinematic Game Over Stage overlay */
        #gameover-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(15,20,35,0.95) 0%, rgba(5,5,10,0.99) 100%);
            z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; backdrop-filter: blur(15px);
        }
        #gameover-screen h1 {
            font-size: 72px; font-weight: 900; color: #ff0055; letter-spacing: 6px; text-shadow: 0 0 30px rgba(255,0,85,0.6); margin-bottom: 5px;
        }
        #gameover-screen p { font-size: 20px; color: #8892b0; margin-bottom: 35px; letter-spacing: 1px; }
        #restart-btn {
            background: linear-gradient(135deg, #00ffcc, #0077ff); color: #fff; padding: 18px 50px; font-size: 18px; font-weight: 800;
            border: none; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,119,255,0.4); letter-spacing: 1px;
        }
        #restart-btn:active { transform: scale(0.95); }

        /* Mobile Controller Layout Overlay Matrix */
        .touch-container {
            position: absolute;
            bottom: 45px;
            left: 0; width: 100%; padding: 0 60px;
            display: flex; justify-content: space-between; align-items: center; z-index: 10; pointer-events: none;
        }
        .btn-side { display: flex; gap: 24px; pointer-events: auto; align-items: center; }
        
        #button-controls { display: flex; gap: 24px; }
        .touch-btn {
            width: 100px; height: 100px; background: rgba(255, 255, 255, 0.9);
            border-radius: 50%; color: #111116; font-size: 34px;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }
        .touch-btn:active { background: #cccccc; transform: scale(0.88); }
        
        .btn-gas { background: #00ff66; color: #fff; font-weight: 900; font-size: 20px; border: none; box-shadow: 0 10px 25px rgba(0,255,102,0.3); }
        .btn-gas:active { background: #00cc52; }
        .btn-brk { background: #ff0055; color: #fff; font-weight: 900; font-size: 20px; border: none; box-shadow: 0 10px 25px rgba(255,0,85,0.3); }
        .btn-brk:active { background: #cc0044; }
        
        .btn-nos {
            background: linear-gradient(135deg, #00f0ff, #0044ff); color: #fff; font-weight: 900; font-size: 19px; border: none;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
        }
        .btn-nos:active { background: #0022aa; box-shadow: 0 0 35px #00f0ff; }

        /* Supercar Dynamic Steering Wheel */
        #steering-wheel {
            width: 180px; height: 180px; border-radius: 50%;
            background: radial-gradient(circle, #252830 20%, #121318 50%, #2a2d36 62%, #050508 100%);
            border: 10px dashed #495057; box-shadow: 0 15px 40px rgba(0,0,0,0.5), inset 0 0 25px #000;
            display: none; pointer-events: auto; position: relative; transform: rotate(0deg); transition: transform 0.03s linear;
        }
        #steering-wheel::before {
            content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 14px; background: #343a40; transform: translateY(-50%);
        }
        #steering-wheel::after {
            content: '▼'; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); color: #00e5ff; font-size: 14px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="damage-flash"></div>

    <div id="gameover-screen">
        <h1>WASTED</h1>
        <p>Your hypercar was completely totaled at extreme velocity!</p>
        <p style="font-size: 32px; font-weight: 900;">FINAL SCORE: <span id="final-score" style="color:#00ffcc;">0</span></p>
        <button id="restart-btn">RESPAWN & RACE</button>
    </div>

    <div id="hud">
        <div class="hud-item">
            <div class="hud-label">Velocity</div>
            <div><span id="speed-val" class="hud-val">0</span> <span style="font-size:14px; color:#8892b0;">KM/H</span></div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Structural Shield</div>
            <div id="hp-container"><div id="hp-bar"></div></div>
        </div>
        <div class="hud-item" style="margin-bottom:0;">
            <div class="hud-label">Distance Tracker</div>
            <div><span id="score-val" class="hud-val" style="color:#00ffcc;">0</span></div>
        </div>
    </div>

    <div class="system-menu">
        <button class="sys-btn" id="weather-btn">TIME: DAYTIME</button>
        <button class="sys-btn" id="mode-switcher">DRIVE STYLE</button>
    </div>

    <div id="gameCanvas"></div>

    <div class="touch-container">
        <div class="btn-side">
            <div id="button-controls">
                <div class="touch-btn" id="key-left">◀</div>
                <div class="touch-btn" id="key-right">▶</div>
            </div>
            <div id="steering-wheel"></div>
        </div>

        <div class="btn-side">
            <div class="touch-btn btn-brk" id="key-down">B</div>
            <div class="touch-btn btn-nos" id="key-nos">NOS</div>
            <div class="touch-btn btn-gas" id="key-up">GAS</div>
        </div>
    </div>

<script>
// UI Object Hooks
const speedVal = document.getElementById('speed-val');
const scoreVal = document.getElementById('score-val');
const hpBar = document.getElementById('hp-bar');
const modeSwitcher = document.getElementById('mode-switcher');
const weatherBtn = document.getElementById('weather-btn');
const buttonControls = document.getElementById('button-controls');
const steeringWheel = document.getElementById('steering-wheel');
const damageFlash = document.getElementById('damage-flash');
const gameoverScreen = document.getElementById('gameover-screen');
const finalScore = document.getElementById('final-score');
const restartBtn = document.getElementById('restart-btn');

// Graphics Engine variables
let scene, camera, renderer, globalLight, sunMesh;
let playerCar, road;
let enemies = [];
let environmentObjects = [];
let nitroParticles = [];

// Realistic Multi-Tier Physics Engine Parameters
let speed = 0;
let maxSpeed = 2.5; 
const baseMaxSpeed = 2.5;
const nitroMaxSpeed = 3.8; // Extreme 460 KM/H calculation vector
const accel = 0.035;
const brk = -0.09;
const decel = -0.01;

let keys = { left: false, right: false, up: false, down: false, nos: false };
let score = 0;
let hp = 100;
let isGameOver = false;

let controlMode = 'buttons'; 
let wheelActive = false;
let wheelStartAngle = 0;
let wheelCurrentRotation = 0;

// Weather Engine Status Matrix: 'day' | 'night' | 'sunset'
let weatherMode = 'day'; 

function initEngine() {
    scene = new THREE.Scene();
    
    // Core PBR Shader Engine Setup
    applyWeatherProfile('day');

    camera = new THREE.PerspectiveCamera(54, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.0, 5.8); 
    camera.lookAt(0, 0.8, -5);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    document.getElementById('gameCanvas').appendChild(renderer.domElement);

    // Daylight Ambient
    const ambientLight = new THREE.AmbientLight('#ffffff', 0.6);
    scene.add(ambientLight);

    globalLight = new THREE.DirectionalLight('#ffffff', 1.5);
    globalLight.position.set(30, 90, 10);
    scene.add(globalLight);

    // Sky Core Object Sun Sphere
    const sunGeo = new THREE.SphereGeometry(8, 32, 32);
    const sunMat = new THREE.MeshBasicMaterial({ color: '#fffde7' });
    sunMesh = new THREE.Mesh(sunGeo, sunMat);
    sunMesh.position.set(60, 65, -350);
    scene.add(sunMesh);

    buildAdvancedHighway();
    buildHypercarMesh();
    buildTrafficSystem();
    buildProceduralCityscape();

    setupControlFramework();
    window.addEventListener('resize', onWindowResize, false);
}

// Shader Matrix Switcher Engine Profiles
function applyWeatherProfile(mode) {
    if (mode === 'day') {
        scene.background = new THREE.Color('#9cc2ff');
        scene.fog = new THREE.FogExp2('#9cc2ff', 0.006);
        if(globalLight) { globalLight.color.set('#ffffff'); globalLight.intensity = 1.5; }
        if(sunMesh) { sunMesh.material.color.set('#fffde7'); sunMesh.position.set(60, 65, -350); }
    } else if (mode === 'night') {
        scene.background = new THREE.Color('#030511');
        scene.fog = new THREE.FogExp2('#030511', 0.008);
        if(globalLight) { globalLight.color.set('#4d66ff'); globalLight.intensity = 0.5; }
        if(sunMesh) { sunMesh.material.color.set('#90a4ae'); sunMesh.position.set(-50, 45, -300); }
    } else if (mode === 'sunset') {
        scene.background = new THREE.Color('#e65100');
        scene.fog = new THREE.FogExp2('#e65100', 0.007);
        if(globalLight) { globalLight.color.set('#ffb74d'); globalLight.intensity = 1.4; }
        if(sunMesh) { sunMesh.material.color.set('#ff3d00'); sunMesh.position.set(40, 25, -320); }
    }
}

function buildAdvancedHighway() {
    const roadGeo = new THREE.PlaneGeometry(18, 2000);
    // Real PBR styled Asphalt Texture shaders
    const roadMat = new THREE.MeshStandardMaterial({ color: '#1f2026', roughness: 0.5, metalness: 0.2 });
    road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0, -900);
    scene.add(road);

    // Add High Definition Continuous Highway Markings Grid
    for(let i = 0; i > -2000; i -= 25) {
        const lineGeo = new THREE.PlaneGeometry(0.35, 9);
        const lineMat = new THREE.MeshBasicMaterial({ color: '#ffffff', side: THREE.DoubleSide });
        
        const markL = new THREE.Mesh(lineGeo, lineMat);
        markL.rotation.x = -Math.PI / 2;
        markL.position.set(-3, 0.02, i);
        
        const markR = markL.clone();
        markR.position.x = 3;
        
        scene.add(markL, markR);
        environmentObjects.push(markL, markR);
    }
}

// Next-Gen Ultra HD Shell Hypercar Assembly (PBR Metalness Custom Shell)
function buildHypercarMesh() {
    playerCar = new THREE.Group();

    const chromeCarbonPaint = new THREE.MeshStandardMaterial({ 
        color: '#ff003c', metalness: 0.9, roughness: 0.08, clearcoat: 1.0, clearcoatRoughness: 0.02 
    });
    const fusedGlass = new THREE.MeshStandardMaterial({ color: '#05070a', roughness: 0.02, metalness: 0.95 });
    const trimMat = new THREE.MeshStandardMaterial({ color: '#0d0d0f', roughness: 0.65 });

    // Streamlined Low Profile Air Intake Nose
    const frontGeo = new THREE.CylinderGeometry(0.4, 0.9, 1.7, 24);
    frontGeo.rotateX(Math.PI / 2); frontGeo.scale(2.1, 0.24, 1);
    const nose = new THREE.Mesh(frontGeo, chromeCarbonPaint);
    nose.position.set(0, 0.22, -1.65);
    playerCar.add(nose);

    // Wide Aero Chassis Monocoque Fuselage
    const fuselageGeo = new THREE.CylinderGeometry(0.82, 0.98, 3.0, 24);
    fuselageGeo.rotateX(Math.PI / 2); fuselageGeo.scale(2.15, 0.42, 1);
    const bodyCell = new THREE.Mesh(fuselageGeo, chromeCarbonPaint);
    bodyCell.position.set(0, 0.33, 0.35);
    playerCar.add(bodyCell);

    // Curved Panoramic Carbon Windshield Shield
    const glassGeo = new THREE.SphereGeometry(0.66, 32, 24, 0, Math.PI * 2, 0, Math.PI / 2);
    glassGeo.scale(1.2, 0.66, 2.1);
    const canopy = new THREE.Mesh(glassGeo, fusedGlass);
    canopy.position.set(0, 0.46, -0.02);
    playerCar.add(canopy);

    // Racing GT Spoiler Wing
    const mainSpoiler = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.03, 0.6), trimMat);
    mainSpoiler.position.set(0, 0.9, 1.85);
    playerCar.add(mainSpoiler);

    const wingPillarL = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.42, 0.12), trimMat);
    wingPillarL.position.set(-1.0, 0.69, 1.75); wingPillarL.rotation.x = 0.24;
    playerCar.add(wingPillarL);
    const wingPillarR = wingPillarL.clone(); wingPillarR.position.x = 1.0;
    playerCar.add(wingPillarR);

    // Xenon Hyper Laser Beams
    const headlightMat = new THREE.MeshBasicMaterial({ color: '#00f6ff' });
    const beamL = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.04, 0.12), headlightMat);
    beamL.position.set(-0.82, 0.28, -2.32); beamL.rotation.y = 0.16;
    playerCar.add(beamL);
    const beamR = beamL.clone(); beamR.position.x = 0.82; beamR.rotation.y = -0.16;
    playerCar.add(beamR);

    // Heavy Alloy Chrome Wheel Assemblies
    const tireMat = new THREE.MeshStandardMaterial({ color: '#0e0f12', roughness: 0.85 });
    const chromeRim = new THREE.MeshStandardMaterial({ color: '#f0f0f0', metalness: 0.98, roughness: 0.05 });
    const wheelGeo = new THREE.CylinderGeometry(0.44, 0.44, 0.46, 32);
    const rimGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.48, 16);

    const axisPointers = [[-1.08, 0.44, -1.05], [1.08, 0.44, -1.05], [-1.08, 0.44, 1.25], [1.08, 0.44, 1.25]];
    axisPointers.forEach(pos => {
        const tire = new THREE.Mesh(wheelGeo, tireMat); tire.rotation.z = Math.PI / 2;
        const rim = new THREE.Mesh(rimGeo, chromeRim); rim.rotation.z = Math.PI / 2;
        const subWheel = new THREE.Group();
        subWheel.add(tire, rim);
        subWheel.position.set(pos[0], pos[1], pos[2]);
        playerCar.add(subWheel);
    });

    // Setup 3D Nitro Exhaust Pipe emitters
    const pipeGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.4, 16);
    pipeGeo.rotateX(Math.PI/2);
    const pipeL = new THREE.Mesh(pipeGeo, trimMat);
    pipeL.position.set(-0.4, 0.2, 1.8);
    const pipeR = pipeL.clone(); pipeR.position.x = 0.4;
    playerCar.add(pipeL, pipeR);

    scene.add(playerCar);
}

// Intelligent變道社会车辆 (Traffic Vehicles with Random Lane Actions)
function buildTrafficSystem() {
    const palette = ['#0066ff', '#ffa500', '#7b1fa2', '#ffffff', '#37474f'];
    
    for (let i = 0; i < 6; i++) {
        const npcVehicle = new THREE.Group();
        const paintMat = new THREE.MeshStandardMaterial({ 
            color: palette[i % palette.length], metalness: 0.7, roughness: 0.2, clearcoat: 0.5 
        });
        const cabinMat = new THREE.MeshStandardMaterial({ color: '#0a0a0f', roughness: 0.1 });

        const mainGeo = new THREE.CylinderGeometry(0.76, 0.92, 3.5, 16);
        mainGeo.rotateX(Math.PI/2); mainGeo.scale(1.88, 0.44, 1);
        const bMesh = new THREE.Mesh(mainGeo, paintMat);
        bMesh.position.y = 0.38;
        npcVehicle.add(bMesh);

        const cabMesh = new THREE.Mesh(new THREE.BoxGeometry(1.25, 0.48, 1.8), cabinMat);
        cabMesh.position.set(0, 0.72, 0);
        npcVehicle.add(cabMesh);

        let initialLaneX = (i % 2 === 0) ? -4.5 : 4.5;
        npcVehicle.position.set(initialLaneX, 0, -120 - (i * 80));
        scene.add(npcVehicle);
        
        enemies.push({
            mesh: npcVehicle,
            speed: 0.6 + Math.random() * 0.4,
            laneX: initialLaneX,
            laneChangeTimer: Math.random() * 200,
            targetLaneX: initialLaneX
        });
    }
}

// Endless Procedural Architecture Scenery Engine
function buildProceduralCityscape() {
    const towerColors = ['#b0bec5', '#90a4ae', '#78909c', '#607d8b', '#cfd8dc'];
    
    for (let i = 0; i > -2000; i -= 50) {
        // Left Architecture Hub
        const hL = 35 + Math.random() * 40;
        const wL = 14 + Math.random() * 8;
        const matL = new THREE.MeshStandardMaterial({ color: towerColors[Math.floor(Math.random() * towerColors.length)], roughness: 0.4, metalness: 0.35 });
        const bldL = new THREE.Mesh(new THREE.BoxGeometry(wL, hL, 18), matL);
        bldL.position.set(-22 - wL/2, hL/2, i);
        scene.add(bldL);
        environmentObjects.push(bldL);

        // Right Architecture Hub
        const hR = 35 + Math.random() * 40;
        const wR = 14 + Math.random() * 8;
        const matR = new THREE.MeshStandardMaterial({ color: towerColors[Math.floor(Math.random() * towerColors.length)], roughness: 0.4, metalness: 0.35 });
        const bldR = new THREE.Mesh(new THREE.BoxGeometry(wR, hR, 18), matR);
        bldR.position.set(22 + wR/2, hR/2, i + 25);
        scene.add(bldR);
        environmentObjects.push(bldR);

        // Highway High Density Pines
        const forestMat = new THREE.MeshStandardMaterial({ color: '#1b5e20', roughness: 0.85 });
        const crownGeo = new THREE.SphereGeometry(2.4, 16, 16);
        
        const treeL = new THREE.Mesh(crownGeo, forestMat);
        treeL.position.set(-12, 2.4, i + 20);
        const treeR = treeL.clone();
        treeR.position.x = 12;
        
        scene.add(treeL, treeR);
        environmentObjects.push(treeL, treeR);
    }
}

// Manage 3D NOS Particles Fire Emitters
function executeNitroFX() {
    if (keys.nos && keys.up && speed > 0.5) {
        // Create 3D Flame Particles
        const particleGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const particleMat = new THREE.MeshBasicMaterial({ color: '#00f0ff', transparent: true, opacity: 0.8 });
        
        for (let k = 0; k < 2; k++) {
            const p = new THREE.Mesh(particleGeo, particleMat);
            // Spawn right behind exhaust pipes
            let sideX = k === 0 ? -0.4 : 0.4;
            p.position.set(playerCar.position.x + sideX, 0.2, playerCar.position.z + 1.8);
            scene.add(p);
            nitroParticles.push({
                mesh: p,
                vx: (Math.random() - 0.5) * 0.05,
                vy: (Math.random() - 0.5) * 0.05,
                vz: 0.8 + Math.random() * 0.5, // Fly backwards fast
                life: 1.0
            });
        }
        // Advance Camera Field of View for high speed warp stretch perception
        if (camera.fov < 68) { camera.fov += 0.8; camera.updateProjectionMatrix(); }
    } else {
        // Return Field of View to static normal values seamlessly
        if (camera.fov > 54) { camera.fov -= 1.0; camera.updateProjectionMatrix(); }
    }

    // Process Active Particles Matrix Lifecycle Loops
    for (let i = nitroParticles.length - 1; i >= 0; i--) {
        const p = nitroParticles[i];
        p.mesh.position.x += p.vx;
        p.mesh.position.y += p.vy;
        p.mesh.position.z += p.vz;
        p.life -= 0.05;
        p.mesh.scale.setScalar(p.life);
        
        if (p.life <= 0) {
            scene.remove(p.mesh);
            nitroParticles.splice(i, 1);
        }
    }
}

function setupControlFramework() {
    modeSwitcher.addEventListener('click', () => {
        if (isGameOver) return;
        if (controlMode === 'buttons') {
            controlMode = 'wheel';
            buttonControls.style.display = 'none';
            steeringWheel.style.display = 'block';
            keys.left = false; keys.right = false;
        } else {
            controlMode = 'buttons';
            buttonControls.style.display = 'flex';
            steeringWheel.style.display = 'none';
            wheelCurrentRotation = 0;
            steeringWheel.style.transform = `rotate(0deg)`;
        }
    });

    weatherBtn.addEventListener('click', () => {
        if (weatherMode === 'day') { weatherMode = 'sunset'; weatherBtn.innerText = "TIME: SUNSET"; }
        else if (weatherMode === 'sunset') { weatherMode = 'night'; weatherBtn.innerText = "TIME: MIDNIGHT"; }
        else { weatherMode = 'day'; weatherBtn.innerText = "TIME: DAYTIME"; }
        applyWeatherProfile(weatherMode);
    });

    // Advanced Steering Trigonometry Tracking Systems
    function getTouchAngleRad(e) {
        const bound = steeringWheel.getBoundingClientRect();
        const coreX = bound.left + bound.width / 2;
        const coreY = bound.top + bound.height / 2;
        const touch = e.touches[0];
        return Math.atan2(touch.clientY - coreY, touch.clientX - coreX);
    }

    steeringWheel.addEventListener('touchstart', (e) => {
        e.preventDefault(); if (isGameOver) return;
        wheelActive = true;
        wheelStartAngle = getTouchAngleRad(e) - wheelCurrentRotation;
    }, { passive: false });

    steeringWheel.addEventListener('touchmove', (e) => {
        e.preventDefault(); if (!wheelActive || isGameOver) return;
        let diff = getTouchAngleRad(e) - wheelStartAngle;
        wheelCurrentRotation = Math.max(-2.2, Math.min(2.2, diff));
        steeringWheel.style.transform = `rotate(${wheelCurrentRotation * 57.29}deg)`;
    }, { passive: false });

    const anchorWheel = () => { wheelActive = false; };
    steeringWheel.addEventListener('touchend', anchorWheel);
    steeringWheel.addEventListener('touchcancel', anchorWheel);

    // Setup Touch Input Hooks Hooks
    function linkPedal(id, prop) {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); if(!isGameOver) keys[prop] = true; }, { passive: false });
        el.addEventListener('touchend', (e) => { e.preventDefault(); keys[prop] = false; }, { passive: false });
        el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[prop] = false; }, { passive: false });
    }
    linkPedal('key-left', 'left'); linkPedal('key-right', 'right');
    linkPedal('key-up', 'up'); linkPedal('key-down', 'down'); linkPedal('key-nos', 'nos');

    restartBtn.addEventListener('click', resetGameplaySession);
}

function computeCorePhysics() {
    if (isGameOver) return;

    // Throttle Accel Calculus Engine matrix
    if (keys.nos && keys.up) {
        maxSpeed = nitroMaxSpeed; speed += accel * 1.6;
    } else {
        maxSpeed = baseMaxSpeed;
        if (keys.up) speed += accel;
        else if (keys.down) speed += brk;
        else speed += decel;
    }
    speed = Math.max(0, Math.min(speed, maxSpeed));

    // Resolve Lateral Turn Angles weights matrix
    let steerWeight = 0;
    if (controlMode === 'buttons') {
        if (keys.left) steerWeight = -1;
        if (keys.right) steerWeight = 1;
    } else {
        if (!wheelActive) {
            wheelCurrentRotation *= 0.82; // Snap Wheel smoothly back to middle bounds
            steeringWheel.style.transform = `rotate(${wheelCurrentRotation * 57.29}deg)`;
        }
        steerWeight = wheelCurrentRotation / 2.2;
    }

    // Vector Translations With Physical Body Roll and Drag Lean Mockups
    if (Math.abs(steerWeight) > 0.02 && playerCar.position.x >= -7.6 && playerCar.position.x <= 7.6) {
        playerCar.position.x += 0.25 * steerWeight * (speed / baseMaxSpeed);
        playerCar.rotation.y = -0.24 * steerWeight; // Front end wheel yaw angles
        playerCar.rotation.z = -0.14 * steerWeight; // Rolling sway chassis vectors
    } else {
        playerCar.rotation.y *= 0.78; playerCar.rotation.z *= 0.78;
    }
    playerCar.position.x = Math.max(-7.6, Math.min(7.6, playerCar.position.x));

    // Handle Infinite Scene Progression Translators
    if (speed > 0) {
        score += Math.floor(speed * 20);
        
        environmentObjects.forEach(obj => {
            obj.position.z += speed * 30;
            if (obj.position.z > 25) obj.position.z -= 1900;
        });

        // Smart Traffic Navigation & Intelligent Lane Switching
        enemies.forEach(enemy => {
            // Intelligent AI Logic: Switch lanes randomly to challenge user
            enemy.laneChangeTimer--;
            if (enemy.laneChangeTimer <= 0) {
                enemy.targetLaneX = Math.random() > 0.5 ? -4.5 : 4.5;
                enemy.laneChangeTimer = 150 + Math.random() * 200;
            }
            // Smoothly move towards target lane
            enemy.mesh.position.x += (enemy.targetLaneX - enemy.mesh.position.x) * 0.03;

            // Move vehicle down highway
            enemy.mesh.position.z += (speed * 30) - (enemy.speed * 25);
            
            // Core Physics Intersection hit boxes check
            if (Math.abs(playerCar.position.z - enemy.mesh.position.z) < 3.6 &&
                Math.abs(playerCar.position.x - enemy.mesh.position.x) < 1.8) {
                
                hp -= 34;
                if (hp < 0) hp = 0;
                
                hpBar.style.width = `${hp}%`;
                if(hp <= 30) hpBar.style.background = '#ff0055';
                else if(hp <= 60) hpBar.style.background = '#ffcc00';

                // Trigger Screen Damage Flash Overlay View
                damageFlash.style.opacity = '1';
                setTimeout(() => { damageFlash.style.opacity = '0'; }, 80);

                // AAA Camera Shake Impact feedback matrix
                triggerCameraShake();

                if (hp <= 0) {
                    haltGameSession();
                    return;
                }

                speed = 0.12; // Complete bounce dampening effect
                enemy.mesh.position.z -= 15; 
            }

            if (enemy.mesh.position.z > 25) {
                enemy.mesh.position.z = -450 - Math.random() * 250;
                enemy.mesh.position.x = Math.random() > 0.5 ? -4.5 : 4.5;
                enemy.targetLaneX = enemy.mesh.position.x;
            }
        });
    }

    // Update Global Dashboard Metrics values
    speedVal.innerText = Math.floor((speed / baseMaxSpeed) * 305);
    scoreVal.innerText = score;
}

// Camera shake effect on crash
function triggerCameraShake() {
    let count = 0;
    const originalY = camera.position.y;
    const originalX = camera.position.x;
    
    const shakeInterval = setInterval(() => {
        camera.position.x = originalX + (Math.random() - 0.5) * 0.4;
        camera.position.y = originalY + (Math.random() - 0.5) * 0.4;
        count++;
        if (count > 8) {
            clearInterval(shakeInterval);
            camera.position.x = originalX;
            camera.position.y = originalY;
        }
    }, 20);
}

function haltGameSession() {
    isGameOver = true; speed = 0;
    finalScore.innerText = score;
    gameoverScreen.style.with = 'flex';
    gameoverScreen.style.display = 'flex';
}

function resetGameplaySession() {
    hp = 100; score = 0; speed = 0;
    playerCar.position.set(0, 0, 0);
    hpBar.style.width = '100%';
    hpBar.style.background = 'linear-gradient(90deg, #00ff66, #00ffcc)';
    
    enemies.forEach((enemy, index) => {
        let lx = (index % 2 === 0) ? -4.5 : 4.5;
        enemy.mesh.position.set(lx, 0, -120 - (index * 80));
        enemy.targetLaneX = lx;
    });

    gameoverScreen.style.display = 'none';
    isGameOver = false;
}

function animationPipelineLoop() {
    requestAnimationFrame(animationPipelineLoop);
    computeCorePhysics();
    executeNitroFX();
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// Global Keyboard mapping configuration adapters
window.addEventListener('keydown', (e) => {
    if (isGameOver) return;
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    if (e.key === 'Shift') keys.nos = true;
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    if (e.key === 'Shift') keys.nos = false;
});

// Primary Master Boot Engine Pipeline
initEngine();
animationPipelineLoop();
</script>
