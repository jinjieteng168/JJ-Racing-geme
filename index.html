<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber Race: Absolute Fix</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: #050510;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            background: #0a0a1a;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            background: rgba(5, 5, 15, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #00e5ff;
        }
        .hud-val { color: #00e5ff; }
        .touch-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }
        .btn-side { display: flex; gap: 20px; pointer-events: auto; }
        .touch-btn {
            width: 85px;
            height: 85px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #00e5ff;
            border-radius: 50%;
            color: #00e5ff;
            font-size: 26px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .touch-btn:active { background: rgba(0, 229, 255, 0.4); }
        .btn-gas { border-color: #00ffaa; color: #00ffaa; }
        .btn-gas:active { background: rgba(0, 255, 170, 0.4); }
        .btn-brk { border-color: #ff0055; color: #ff0055; }
        .btn-brk:active { background: rgba(255, 0, 85, 0.4); }
    </style>
</head>
<body>

    <div id="hud">
        <div>RANK: <span id="rank-val" class="hud-val">11 / 11</span></div>
        <div>SPEED: <span id="speed-val" class="hud-val">0</span> KM/H</div>
        <div>SCORE: <span id="score-val" class="hud-val">0</span></div>
    </div>

    <canvas id="gameCanvas" width="1024" height="640"></canvas>

    <div class="touch-container">
        <div class="btn-side">
            <div class="touch-btn" id="key-left">◀</div>
            <div class="touch-btn" id="key-right">▶</div>
        </div>
        <div class="btn-side">
            <div class="touch-btn btn-brk" id="key-down">B</div>
            <div class="touch-btn btn-gas" id="key-up">GAS</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const speedVal = document.getElementById('speed-val');
const scoreVal = document.getElementById('score-val');
const rankVal = document.getElementById('rank-val');

const config = {
    fps: 60,
    roadWidth: 2000,
    segmentLength: 200,
    rumbleLength: 3,
    cameraHeight: 1500, // Safe high-angle camera
    cameraDepth: 0.8,   // Forced standard depth ratio
    drawDistance: 300,
    totalCars: 10
};

let player = {
    x: 0, 
    z: 0, 
    speed: 0,
    maxSpeed: 12000,
    accel: 150,
    breaking: -300,
    decel: -50,
    turnSpeed: 0.06
};

let keys = { left: false, right: false, up: false, down: false };
let segments = [];
let cars = [];
let trackLength = 0;

function createTrack() {
    segments = [];
    for (let i = 0; i < 1000; i++) {
        let curve = 0;
        if (i > 50 && i < 150) curve = 2;
        if (i > 250 && i < 350) curve = -2;
        if (i > 500 && i < 650) curve = 3;
        
        segments.push({
            index: i,
            p1: { x: 0, y: 0, z: i * config.segmentLength },
            p2: { x: 0, y: 0, z: (i + 1) * config.segmentLength },
            curve: curve,
            color: Math.floor(i / config.rumbleLength) % 2 ? 
                   { road: '#151525', grass: '#050510', rumble: '#00e5ff', line: '#ffffff' } : 
                   { road: '#1c1c30', grass: '#080818', rumble: '#ff0055', line: '#000000' }
        });
    }
    trackLength = segments.length * config.segmentLength;
}

function spawnCars() {
    cars = [];
    for (let i = 0; i < config.totalCars; i++) {
        cars.push({
            offset: (i % 2 === 0) ? 0.4 : -0.4,
            z: (i + 1) * 2500, // Spawned right in front of player viewpoint
            speed: 4000 + Math.random() * 3000,
            color: i % 2 === 0 ? '#ffcc00' : '#ff00ff'
        });
    }
}

function project(p, cameraX, cameraY, cameraZ) {
    let transX = p.x - cameraX;
    let transY = p.y - cameraY;
    let transZ = p.z - cameraZ;
    
    // Prevent Division by Zero Error on iPad Safari
    if (transZ <= 0) transZ = 1; 
    
    let scale = config.cameraDepth / transZ;
    
    return {
        x: Math.round((canvas.width / 2) + (scale * transX * canvas.width / 2)),
        y: Math.round((canvas.height / 2) - (scale * transY * canvas.height / 2)),
        w: Math.round(scale * config.roadWidth * canvas.width / 2)
    };
}

function drawSegment(p1, p2, color) {
    // Fill background side grass
    ctx.fillStyle = color.grass;
    ctx.fillRect(0, p2.y, canvas.width, p1.y - p2.y);
    
    // Left Cyber Rumble
    ctx.fillStyle = color.rumble;
    ctx.beginPath();
    ctx.moveTo(p1.x - p1.w * 1.1, p1.y); ctx.lineTo(p1.x - p1.w, p1.y);
    ctx.lineTo(p2.x - p2.w, p2.y); ctx.lineTo(p2.x - p2.w * 1.1, p2.y);
    ctx.fill();
    
    // Right Cyber Rumble
    ctx.beginPath();
    ctx.moveTo(p1.x + p1.w * 1.1, p1.y); ctx.lineTo(p1.x + p1.w, p1.y);
    ctx.lineTo(p2.x + p2.w, p2.y); ctx.lineTo(p2.x + p2.w * 1.1, p2.y);
    ctx.fill();

    // Central Main Road
    ctx.fillStyle = color.road;
    ctx.beginPath();
    ctx.moveTo(p1.x - p1.w, p1.y); ctx.lineTo(p1.x + p1.w, p1.y);
    ctx.lineTo(p2.x + p2.w, p2.y); ctx.lineTo(p2.x - p2.w, p2.y);
    ctx.fill();

    // Center Lanes lines
    if (color.line !== '#000000') {
        ctx.fillStyle = color.line;
        let w1 = p1.w * 0.03, w2 = p2.w * 0.03;
        ctx.beginPath();
        ctx.moveTo(p1.x - w1, p1.y); ctx.lineTo(p1.x + w1, p1.y);
        ctx.lineTo(p2.x + w2, p2.y); ctx.lineTo(p2.x - w2, p2.y);
        ctx.fill();
    }
}

function drawEnemyCar(car, segment) {
    let carX = car.offset * config.roadWidth;
    let transZ = car.z - player.z;
    if (transZ <= 0) return;

    let scale = config.cameraDepth / transZ;
    
    let spriteX = Math.round((canvas.width / 2) + (scale * (carX - (player.x * config.roadWidth)) * canvas.width / 2));
    let spriteY = Math.round((canvas.height / 2) - (scale * (0 - config.cameraHeight) * canvas.height / 2));
    let spriteW = Math.round(scale * 600 * canvas.width / 2);
    let spriteH = spriteW * 0.5;

    // Drawing Box Car shape
    ctx.fillStyle = car.color;
    ctx.fillRect(spriteX - spriteW / 2, spriteY - spriteH, spriteW, spriteH);
    
    // Tail lights
    ctx.fillStyle = '#ff0055';
    ctx.fillRect(spriteX - spriteW / 2 + 4, spriteY - spriteH + 4, spriteW * 0.2, spriteH * 0.2);
    ctx.fillRect(spriteX + spriteW / 2 - (spriteW * 0.2) - 4, spriteY - spriteH + 4, spriteW * 0.2, spriteH * 0.2);
}

function drawPlayer() {
    let x = canvas.width / 2;
    let y = canvas.height - 50;
    
    ctx.save();
    ctx.translate(x, y);
    
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#00e5ff';

    // Player Hypercar Chassis Frame
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath();
    ctx.moveTo(-40, 0);
    ctx.lineTo(-25, -35);
    ctx.lineTo(25, -35);
    ctx.lineTo(40, 0);
    ctx.closePath();
    ctx.fill();
    
    // Engine glow wing
    ctx.fillStyle = '#ff0055';
    ctx.fillRect(-50, -42, 100, 8);
    
    // Cockpit
    ctx.fillStyle = '#050510';
    ctx.fillRect(-15, -25, 30, 18);

    ctx.restore();
}

function update(dt) {
    if (keys.up) player.speed += player.accel;
    else if (keys.down) player.speed += player.breaking;
    else player.speed += player.decel;
    
    player.speed = Math.max(0, Math.min(player.speed, player.maxSpeed));
    player.z += player.speed * dt;
    if (player.z >= trackLength) player.z -= trackLength;
    
    let baseIdx = Math.floor(player.z / config.segmentLength) % segments.length;
    let currentSegment = segments[baseIdx];
    
    if (keys.left) player.x -= player.turnSpeed * (player.speed / player.maxSpeed);
    if (keys.right) player.x += player.turnSpeed * (player.speed / player.maxSpeed);
    
    player.x -= (player.speed / player.maxSpeed) * currentSegment.curve * 0.01;
    player.x = Math.max(-2, Math.min(2, player.x));

    let rank = config.totalCars + 1;
    cars.forEach(car => {
        car.z += car.speed * dt;
        if (car.z >= trackLength) car.z -= trackLength;
        
        // Accurate Smash Matrix
        if (Math.abs(player.z - car.z) < 250 && Math.abs(player.x - car.offset) < 0.5) {
            player.speed = car.speed * 0.4;
        }
        if (player.z > car.z) rank--;
    });

    speedVal.innerText = Math.floor((player.speed / player.maxSpeed) * 310);
    scoreVal.innerText = Math.floor(player.z / 10);
    rankVal.innerText = rank + " / " + (config.totalCars + 1);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Sky Box fill
    ctx.fillStyle = '#030308';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let baseIdx = Math.floor(player.z / config.segmentLength) % segments.length;
    let baseSegment = segments[baseIdx];
    
    let maxy = canvas.height;
    let x = 0, dx = 0;
    
    // Draw 3D road tracks
    for (let n = 0; n < config.drawDistance; n++) {
        let segment = segments[(baseIdx + n) % segments.length];
        let loop = segment.p1.z < baseSegment.p1.z ? trackLength : 0;
        
        let p1_projected = project(segment.p1, (player.x * config.roadWidth) - x, config.cameraHeight, player.z - loop);
        let p2_projected = project(segment.p2, (player.x * config.roadWidth) - x - dx, config.cameraHeight, player.z - loop);
        
        segment.p1.screenX = p1_projected.x;
        segment.p1.screenY = p1_projected.y;
        segment.p1.screenW = p1_projected.w;
        
        segment.p2.screenX = p2_projected.x;
        segment.p2.screenY = p2_projected.y;
        segment.p2.screenW = p2_projected.w;
        
        x += dx;
        dx += segment.curve;
        
        if (segment.p1.z <= player.z || segment.p2.screenY >= maxy) continue;
        
        drawSegment(segment.p1, segment.p2, segment.color);
        maxy = segment.p2.screenY;
    }
    
    // Render Enemy AI cars correctly layered above road grid
    for (let n = config.drawDistance - 1; n >= 0; n--) {
        let segment = segments[(baseIdx + n) % segments.length];
        cars.forEach(car => {
            let carIdx = Math.floor(car.z / config.segmentLength) % segments.length;
            if (carIdx === segment.index) {
                drawEnemyCar(car, segment);
            }
        });
    }
    
    drawPlayer();
}

function frame() {
    update(1 / config.fps);
    render();
    requestAnimationFrame(frame);
}

function attachTouch(id, action) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[action] = true; }, { passive: false });
    el.addEventListener('touchend', (e) => { e.preventDefault(); keys[action] = false; }, { passive: false });
    el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[action] = false; }, { passive: false });
}
attachTouch('key-left', 'left');
attachTouch('key-right', 'right');
attachTouch('key-up', 'up');
attachTouch('key-down', 'down');

window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

createTrack();
spawnCars();
frame();
</script>
</body>
</html>
