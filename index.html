<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> JJ racing game </title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: #111;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Sleek Modern Dashboard HUD */
        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #ffffff;
            font-size: 22px;
            font-weight: 800;
            pointer-events: none;
            z-index: 10;
            background: rgba(15, 15, 25, 0.75);
            padding: 18px 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hud-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .hud-val {
            font-family: monospace;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0,255,204,0.5);
        }
        
        /* Premium iPad Controls Overlay */
        .touch-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }
        .btn-side { display: flex; gap: 30px; pointer-events: auto; }
        .touch-btn {
            width: 95px;
            height: 95px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #ffffff;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
        }
        .touch-btn:active { 
            transform: scale(0.88);
            background: rgba(0, 255, 204, 0.2);
            border-color: #00ffcc;
        }
        .btn-gas { background: rgba(0, 255, 102, 0.05); border-color: rgba(0, 255, 102, 0.3); color: #00ff66; }
        .btn-gas:active { background: rgba(0, 255, 102, 0.2); border-color: #00ff66; }
        .btn-brk { background: rgba(255, 0, 85, 0.05); border-color: rgba(255, 0, 85, 0.3); color: #ff0055; }
        .btn-brk:active { background: rgba(255, 0, 85, 0.2); border-color: #ff0055; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div class="hud-label">Velocity</div>
        <div style="margin-bottom: 10px;"><span id="speed-val" class="hud-val">0</span> <span style="font-size:14px; color:#fff;">KM/H</span></div>
        <div class="hud-label">Score</div>
        <div><span id="score-val" class="hud-val" style="color:#fff; text-shadow:none;">0</span></div>
    </div>

    <div id="gameCanvas"></div>

    <div class="touch-container">
        <div class="btn-side">
            <div class="touch-btn" id="key-left">◀</div>
            <div class="touch-btn" id="key-right">▶</div>
        </div>
        <div class="btn-side">
            <div class="touch-btn btn-brk" id="key-down">B</div>
            <div class="touch-btn btn-gas" id="key-up">GAS</div>
        </div>
    </div>

<script>
const speedVal = document.getElementById('speed-val');
const scoreVal = document.getElementById('score-val');

let scene, camera, renderer, mainLight;
let playerCar, road, sun;
let enemies = [];
let speedLines = [];
let environmentObjects = [];

let speed = 0;
const maxSpeed = 2.2;
const accel = 0.025;
const brk = -0.06;
const decel = -0.008;
let keys = { left: false, right: false, up: false, down: false };
let score = 0;

function init3D() {
    scene = new THREE.Scene();
    
    // High-quality atmospheric sky gradient environment
    scene.background = new THREE.Color('#0a1128'); 
    scene.fog = new THREE.FogExp2('#0a1128', 0.008);

    camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.3, 6.5); // Lower, sportier chasing view angle
    camera.lookAt(0, 0.8, -5);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Dynamic Retina scaling
    renderer.toneMapping = THREE.ACESFilmicToneMapping; // Cinematic lighting grading
    renderer.toneMappingExposure = 1.0;
    document.getElementById('gameCanvas').appendChild(renderer.domElement);

    // Realistic Lighting System
    const ambientLight = new THREE.AmbientLight('#ffffff', 0.4);
    scene.add(ambientLight);

    mainLight = new THREE.DirectionalLight('#ffdfb0', 1.8); // Golden hour cinematic light
    mainLight.position.set(30, 45, 40);
    scene.add(mainLight);

    // Cinematic Sun Centerpiece
    const sunGeo = new THREE.SphereGeometry(6, 32, 32);
    const sunMat = new THREE.MeshBasicMaterial({ color: '#ffb74d' });
    sun = new THREE.Mesh(sunGeo, sunMat);
    sun.position.set(-60, 30, -300);
    scene.add(sun);

    setupRoad();
    setupStreamlinedCar();
    setupSpeedLines();
    setupTraffic();
    setupLandscape();

    window.addEventListener('resize', onWindowResize, false);
}

function setupRoad() {
    // Detailed textured asphalt road geometry
    const roadGeo = new THREE.PlaneGeometry(16, 2000);
    const roadMat = new THREE.MeshStandardMaterial({ 
        color: '#1a1a1f', 
        roughness: 0.6, 
        metalness: 0.2 
    });
    road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0, -900);
    scene.add(road);

    // High-visibility crisp dual lane markers
    for(let i = 0; i > -2000; i -= 20) {
        const lineGeo = new THREE.PlaneGeometry(0.25, 6);
        const lineMat = new THREE.MeshBasicMaterial({ color: '#ffcc00', side: THREE.DoubleSide });
        
        const leftLine = new THREE.Mesh(lineGeo, lineMat);
        leftLine.rotation.x = -Math.PI / 2;
        leftLine.position.set(-2.5, 0.02, i);
        
        const rightLine = leftLine.clone();
        rightLine.position.x = 2.5;
        
        scene.add(leftLine, rightLine);
        environmentObjects.push(leftLine, rightLine);
    }
}

// Procedural Streamlined Hypercar Assembly (No more blocks!)
function setupStreamlinedCar() {
    playerCar = new THREE.Group();

    // Metallic premium car paint shader setup
    const paintMat = new THREE.MeshStandardMaterial({ 
        color: '#d50000', 
        metalness: 0.8, 
        roughness: 0.15,
        clearcoat: 1.0,
        clearcoatRoughness: 0.1
    });
    const carbonMat = new THREE.MeshStandardMaterial({ color: '#111113', roughness: 0.5 });

    // 1. Sleek Lower Nose/Front Splitter
    const noseGeo = new THREE.CylinderGeometry(0.6, 0.9, 1.4, 4);
    noseGeo.rotateX(Math.PI / 2);
    noseGeo.scale(1.8, 0.3, 1);
    const nose = new THREE.Mesh(noseGeo, paintMat);
    nose.position.set(0, 0.25, -1.5);
    playerCar.add(nose);

    // 2. Aerodynamic Main Fuselage Body
    const mainBodyGeo = new THREE.CylinderGeometry(0.8, 0.95, 2.6, 8);
    mainBodyGeo.rotateX(Math.PI / 2);
    mainBodyGeo.scale(1.9, 0.45, 1);
    const mainBody = new THREE.Mesh(mainBodyGeo, paintMat);
    mainBody.position.set(0, 0.38, 0.2);
    playerCar.add(mainBody);

    // 3. Curved Fighter-Jet Style Cockpit Window
    const cockpitGeo = new THREE.SphereGeometry(0.65, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
    cockpitGeo.scale(1.2, 0.7, 2.2);
    const cockpit = new THREE.Mesh(cockpitGeo, carbonMat);
    cockpit.position.set(0, 0.5, -0.1);
    playerCar.add(cockpit);

    // 4. GT3 Racing Wing Spoiler
    const spoilerWing = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.04, 0.5), carbonMat);
    spoilerWing.position.set(0, 0.85, 1.7);
    playerCar.add(spoilerWing);

    const mountL = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.4, 0.1), carbonMat);
    mountL.position.set(-0.9, 0.65, 1.6);
    mountL.rotation.x = 0.2;
    playerCar.add(mountL);
    const mountR = mountL.clone();
    mountR.position.x = 0.9;
    playerCar.add(mountR);

    // 5. LED Xenon Laser Headlights
    const ledMat = new THREE.MeshBasicMaterial({ color: '#00ffcc' });
    const headlightL = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.4, 4), ledMat);
    headlightL.rotation.x = -Math.PI / 2;
    headlightL.position.set(-0.75, 0.32, -2.1);
    playerCar.add(headlightL);
    const headlightR = headlightL.clone();
    headlightR.position.x = 0.75;
    playerCar.add(headlightR);

    // 6. Premium Chrome Finished Alloy Wheels
    const tireMat = new THREE.MeshStandardMaterial({ color: '#0c0c0e', roughness: 0.85 });
    const rimMat = new THREE.MeshStandardMaterial({ color: '#cccccc', metalness: 0.9, roughness: 0.1 });
    const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.45, 32);
    const rimGeo = new THREE.CylinderGeometry(0.26, 0.26, 0.47, 16);

    const wheelHubs = [
        [-1.02, 0.4, -1.0], [1.02, 0.4, -1.0],
        [-1.02, 0.4, 1.1],  [1.02, 0.4, 1.1]
    ];

    wheelHubs.forEach(pos => {
        const tire = new THREE.Mesh(wheelGeo, tireMat);
        tire.rotation.z = Math.PI / 2;
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.rotation.z = Math.PI / 2;
        
        const wheelAssembly = new THREE.Group();
        wheelAssembly.add(tire, rim);
        wheelAssembly.position.set(pos[0], pos[1], pos[2]);
        playerCar.add(wheelAssembly);
    });

    scene.add(playerCar);
}

// Dynamic speed lines to eliminate the "fake static grid" feeling
function setupSpeedLines() {
    const lineMat = new THREE.LineBasicMaterial({ color: '#ffffff', transparent: true, opacity: 0.3 });
    for(let i=0; i<30; i++) {
        const points = [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0, -10 - Math.random()*20)];
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geo, lineMat);
        line.position.set(Math.random()*40 - 20, Math.random()*8, -Math.random()*400);
        scene.add(line);
        speedLines.push(line);
    }
}

function setupTraffic() {
    const carColors = ['#ffbc00', '#00b0ff', '#aa00ff', '#111111'];
    
    for (let i = 0; i < 5; i++) {
        const enemy = new THREE.Group();
        const paint = new THREE.MeshStandardMaterial({ color: carColors[i % carColors.length], metalness: 0.7, roughness: 0.2 });
        
        // Streamlined body curve for traffic cars
        const bGeo = new THREE.CylinderGeometry(0.75, 0.9, 3.4, 6);
        bGeo.rotateX(Math.PI/2);
        bGeo.scale(1.8, 0.4, 1);
        const body = new THREE.Mesh(bGeo, paint);
        body.position.y = 0.35;
        enemy.add(body);

        let laneX = (i % 2 === 0) ? -4 : 4;
        enemy.position.set(laneX, 0, -80 - (i * 70));
        scene.add(enemy);
        
        enemies.push({
            mesh: enemy,
            speed: 0.4 + Math.random() * 0.3
        });
    }
}

function setupLandscape() {
    // Smooth spherical organic pine trees
    const leafMat = new THREE.MeshStandardMaterial({ color: '#1b4d3e', roughness: 0.7 });
    const trunkMat = new THREE.MeshStandardMaterial({ color: '#3e2723' });

    for (let i = 0; i > -1500; i -= 35) {
        const leftTree = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.35, 3), trunkMat);
        trunk.position.y = 1.5;
        const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.6, 16, 16), leafMat);
        leaves.position.y = 4;
        leftTree.add(trunk, leaves);
        
        leftTree.position.set(-14 - Math.random()*4, 0, i);
        const rightTree = leftTree.clone();
        rightTree.position.x = 14 + Math.random()*4;
        
        scene.add(leftTree, rightTree);
        environmentObjects.push(leftTree, rightTree);
    }
}

function updateGame() {
    // Handling Velocity Controls Physics Engine
    if (keys.up) speed += accel;
    else if (keys.down) speed += brk;
    else speed += decel;

    speed = Math.max(0, Math.min(speed, maxSpeed));

    // Responsive Organic Cornering Steering Matrix
    if (keys.left && playerCar.position.x > -6.5) {
        playerCar.position.x -= 0.18 * (speed / maxSpeed);
        playerCar.rotation.y = 0.18; 
        playerCar.rotation.z = 0.08; // Roll body into corner
    } else if (keys.right && playerCar.position.x < 6.5) {
        playerCar.position.x += 0.18 * (speed / maxSpeed);
        playerCar.rotation.y = -0.18;
        playerCar.rotation.z = -0.08;
    } else {
        playerCar.rotation.y *= 0.85; // Seamless center alignment snaps
        playerCar.rotation.z *= 0.85;
    }

    if (speed > 0) {
        score += Math.floor(speed * 12);
        
        // Dynamic speed lines translation updates
        speedLines.forEach(line => {
            line.position.z += speed * 45;
            if (line.position.z > 10) line.position.z = -400 - Math.random()*200;
        });

        // Endless scenery reposition engine loop
        environmentObjects.forEach(obj => {
            obj.position.z += speed * 25;
            if (obj.position.z > 20) obj.position.z -= 1400;
        });

        // Smart Traffic management
        enemies.forEach(enemy => {
            enemy.mesh.position.z += (speed * 25) - (enemy.speed * 22);
            
            // Ultra-precise vehicle bounding box hit intersection testing
            if (Math.abs(playerCar.position.z - enemy.mesh.position.z) < 3.4 &&
                Math.abs(playerCar.position.x - enemy.mesh.position.x) < 1.7) {
                speed = 0.15; // Realistic crash feedback slowdown
                enemy.mesh.position.z -= 8;
            }

            if (enemy.mesh.position.z > 20) {
                enemy.mesh.position.z = -400 - Math.random() * 150;
                enemy.mesh.position.x = Math.random() > 0.5 ? -4 : 4;
            }
        });
    }

    // Bind values smoothly into HUD dashboard
    speedVal.innerText = Math.floor((speed / maxSpeed) * 325);
    scoreVal.innerText = score;
}

function animate() {
    requestAnimationFrame(animate);
    updateGame();
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function bindTouch(id, prop) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[prop] = true; }, { passive: false });
    el.addEventListener('touchend', (e) => { e.preventDefault(); keys[prop] = false; }, { passive: false });
    el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[prop] = false; }, { passive: false });
}
bindTouch('key-left', 'left');
bindTouch('key-right', 'right');
bindTouch('key-up', 'up');
bindTouch('key-down', 'down');

window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

init3D();
animate();
</script>
</body>
</html>
