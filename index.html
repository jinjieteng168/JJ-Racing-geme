<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> JJ racing game </title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: #f0f4f8;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* High-Definition Dashboard HUD */
        #hud {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #111115;
            font-size: 20px;
            font-weight: 800;
            pointer-events: none;
            z-index: 10;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .hud-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hud-val {
            font-family: monospace;
            color: #ff3300;
            font-size: 24px;
        }

        /* Control Mode Switcher Button */
        #mode-switcher {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
            background: #111;
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        #mode-switcher:active { transform: scale(0.95); }
        
        /* Ergonomic Controller Container */
        .touch-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .btn-side { display: flex; gap: 20px; pointer-events: auto; align-items: center; }
        
        /* Traditional Buttons Group */
        #button-controls { display: flex; gap: 20px; }
        .touch-btn {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            color: #111;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .touch-btn:active { background: #e0e0e0; transform: scale(0.9); }
        .btn-gas { background: #00ff66; color: #fff; font-weight: bold; font-size: 20px; border: none; }
        .btn-gas:active { background: #00cc52; }
        .btn-brk { background: #ff0055; color: #fff; font-weight: bold; font-size: 20px; border: none; }
        .btn-brk:active { background: #cc0044; }

        /* Virtual Steering Wheel Object */
        #steering-wheel {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, #333 30%, #111 60%, #222 70%, #000 100%);
            border: 8px dashed #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 0 15px #000;
            display: none; /* Toggled via JS */
            pointer-events: auto;
            position: relative;
            transform: rotate(0deg);
            transition: transform 0.05s linear;
        }
        #steering-wheel::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 10px; background: #555;
            transform: translateY(-50%);
        }
        #steering-wheel::after {
            content: '▲';
            position: absolute;
            top: 5px; left: 50%;
            transform: translateX(-50%);
            color: #ff3300;
            font-size: 14px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div class="hud-label">Velocity</div>
        <div style="margin-bottom: 5px;"><span id="speed-val" class="hud-val">0</span> <span style="font-size:14px; color:#333;">KM/H</span></div>
        <div class="hud-label">Distance Score</div>
        <div><span id="score-val" class="hud-val" style="color:#111;">0</span></div>
    </div>

    <button id="mode-switcher">SWITCH CONTROL</button>

    <div id="gameCanvas"></div>

    <div class="touch-container">
        <div class="btn-side">
            <div id="button-controls">
                <div class="touch-btn" id="key-left">◀</div>
                <div class="touch-btn" id="key-right">▶</div>
            </div>
            <div id="steering-wheel"></div>
        </div>

        <div class="btn-side">
            <div class="touch-btn btn-brk" id="key-down">B</div>
            <div class="touch-btn btn-gas" id="key-up">GAS</div>
        </div>
    </div>

<script>
const speedVal = document.getElementById('speed-val');
const scoreVal = document.getElementById('score-val');
const modeSwitcher = document.getElementById('mode-switcher');
const buttonControls = document.getElementById('button-controls');
const steeringWheel = document.getElementById('steering-wheel');

let scene, camera, renderer, sunLight;
let playerCar, road, sun;
let enemies = [];
let environmentObjects = [];

let speed = 0;
const maxSpeed = 2.5;
const accel = 0.03;
const brk = -0.07;
const decel = -0.008;
let keys = { left: false, right: false, up: false, down: false };
let score = 0;

// Control Toggle Mode: 'buttons' or 'wheel'
let controlMode = 'buttons'; 
let wheelActive = false;
let wheelStartAngle = 0;
let wheelCurrentRotation = 0;

function init3D() {
    scene = new THREE.Scene();
    
    // Bright crisp daytime sky and atmosphere fog
    scene.background = new THREE.Color('#a0cfff'); 
    scene.fog = new THREE.FogExp2('#a0cfff', 0.005);

    camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.2, 6.2); // Low realistic dynamic trailing angle
    camera.lookAt(0, 0.9, -5);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // High definition pixel mapping
    renderer.toneMapping = THREE.ACESFilmicToneMapping; // Modern HDR tone rendering
    renderer.toneMappingExposure = 1.2;
    document.getElementById('gameCanvas').appendChild(renderer.domElement);

    // Day Global Lighting
    const ambientLight = new THREE.AmbientLight('#ffffff', 0.65);
    scene.add(ambientLight);

    sunLight = new THREE.DirectionalLight('#ffffff', 1.5);
    sunLight.position.set(40, 100, 20);
    scene.add(sunLight);

    // Glowing Day Sun Sphere
    const sunGeo = new THREE.SphereGeometry(7, 32, 32);
    const sunMat = new THREE.MeshBasicMaterial({ color: '#fff9c4' });
    sun = new THREE.Mesh(sunGeo, sunMat);
    sun.position.set(80, 70, -400);
    scene.add(sun);

    setupCityRoad();
    setupHDPlayerCar();
    setupHDTraffic();
    setupCitySkyline();

    setupControlInteractions();
    window.addEventListener('resize', onWindowResize, false);
}

function setupCityRoad() {
    const roadGeo = new THREE.PlaneGeometry(18, 2000);
    const roadMat = new THREE.MeshStandardMaterial({ color: '#2c2d35', roughness: 0.5, metalness: 0.1 });
    road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0, -900);
    scene.add(road);

    // Double Continuous White highway markings
    for(let i = 0; i > -2000; i -= 25) {
        const lineGeo = new THREE.PlaneGeometry(0.3, 8);
        const lineMat = new THREE.MeshBasicMaterial({ color: '#ffffff', side: THREE.DoubleSide });
        
        const lineL = new THREE.Mesh(lineGeo, lineMat);
        lineL.rotation.x = -Math.PI / 2;
        lineL.position.set(-3, 0.02, i);
        
        const lineR = lineL.clone();
        lineR.position.x = 3;
        
        scene.add(lineL, lineR);
        environmentObjects.push(lineL, lineR);
    }
}

// Streamlined HD Player Supercar
function setupHDPlayerCar() {
    playerCar = new THREE.Group();

    // High Gloss Deep Metallic Clearcoat Paint Material
    const bodyPaint = new THREE.MeshStandardMaterial({ 
        color: '#ff1100', metalness: 0.8, roughness: 0.1, clearcoat: 1.0, clearcoatRoughness: 0.05 
    });
    const glassMat = new THREE.MeshStandardMaterial({ color: '#090a10', roughness: 0.05, metalness: 0.9 });
    const trimMat = new THREE.MeshStandardMaterial({ color: '#151518', roughness: 0.6 });

    // Streamlined Curvature Hood Nose
    const frontGeo = new THREE.CylinderGeometry(0.5, 0.9, 1.5, 16);
    frontGeo.rotateX(Math.PI / 2);
    frontGeo.scale(2.0, 0.26, 1);
    const frontBody = new THREE.Mesh(frontGeo, bodyPaint);
    frontBody.position.set(0, 0.22, -1.6);
    playerCar.add(frontBody);

    // Main Mid-Engine Chassis Cockpit shell
    const cabinShellGeo = new THREE.CylinderGeometry(0.85, 1.0, 2.8, 16);
    cabinShellGeo.rotateX(Math.PI / 2);
    cabinShellGeo.scale(2.1, 0.46, 1);
    const mainChassis = new THREE.Mesh(cabinShellGeo, bodyPaint);
    mainChassis.position.set(0, 0.35, 0.3);
    playerCar.add(mainChassis);

    // Highly Curved Panoramic Windshield
    const windowGeo = new THREE.SphereGeometry(0.7, 32, 20, 0, Math.PI * 2, 0, Math.PI / 2);
    windowGeo.scale(1.25, 0.68, 2.0);
    const windshield = new THREE.Mesh(windowGeo, glassMat);
    windshield.position.set(0, 0.48, -0.1);
    playerCar.add(windshield);

    // Downforce Carbon Fiber GT Spoiler Rear Wing
    const wingBlade = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.03, 0.55), trimMat);
    wingBlade.position.set(0, 0.88, 1.8);
    playerCar.add(wingBlade);

    const wingMountL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.42, 0.1), trimMat);
    wingMountL.position.set(-0.95, 0.68, 1.7);
    wingMountL.rotation.x = 0.25;
    playerCar.add(wingMountL);
    const wingMountR = wingMountL.clone();
    wingMountR.position.x = 0.95;
    playerCar.add(wingMountR);

    // Hypercar Xenon LED DRL Headlights Strip
    const ledMat = new THREE.MeshBasicMaterial({ color: '#00e5ff' });
    const lampL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.06, 0.1), ledMat);
    lampL.position.set(-0.8, 0.28, -2.25);
    lampL.rotation.y = 0.2;
    playerCar.add(lampL);
    const lampR = lampL.clone();
    lampR.position.x = 0.8;
    lampR.rotation.y = -0.2;
    playerCar.add(lampR);

    // Heavy Alloy Sports Rims and Tires
    const tireMat = new THREE.MeshStandardMaterial({ color: '#131316', roughness: 0.9 });
    const chromeRim = new THREE.MeshStandardMaterial({ color: '#e0e0e0', metalness: 0.95, roughness: 0.05 });
    const tireGeo = new THREE.CylinderGeometry(0.42, 0.42, 0.45, 32);
    const rimGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.47, 16);

    const axels = [[-1.08, 0.42, -1.1], [1.08, 0.42, -1.1], [-1.08, 0.42, 1.2], [1.08, 0.42, 1.2]];
    axels.forEach(pos => {
        const tireMesh = new THREE.Mesh(tireGeo, tireMat);
        tireMesh.rotation.z = Math.PI / 2;
        const rimMesh = new THREE.Mesh(rimGeo, chromeRim);
        rimMesh.rotation.z = Math.PI / 2;
        
        const wheelUnit = new THREE.Group();
        wheelUnit.add(tireMesh, rimMesh);
        wheelUnit.position.set(pos[0], pos[1], pos[2]);
        playerCar.add(wheelUnit);
    });

    scene.add(playerCar);
}

// Spawn High-Definition Realistic Traffic Cars (Other Cars)
function setupHDTraffic() {
    const palette = ['#0066ff', '#ffaa00', '#00ffaa', '#ffffff', '#555555'];
    
    for (let i = 0; i < 6; i++) {
        const trafficCar = new THREE.Group();
        const carColor = palette[i % palette.length];
        const paintMat = new THREE.MeshStandardMaterial({ color: carColor, metalness: 0.6, roughness: 0.2 });
        const windowMat = new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.1 });

        // Streamlined Curved Body Core
        const mainGeo = new THREE.CylinderGeometry(0.8, 0.95, 3.5, 12);
        mainGeo.rotateX(Math.PI/2);
        mainGeo.scale(1.9, 0.42, 1);
        const bMesh = new THREE.Mesh(mainGeo, paintMat);
        bMesh.position.y = 0.38;
        trafficCar.add(bMesh);

        // Glass cabin block
        const cabGeo = new THREE.BoxGeometry(1.3, 0.45, 1.8);
        const cabMesh = new THREE.Mesh(cabGeo, windowMat);
        cabMesh.position.set(0, 0.7, 0);
        trafficCar.add(cabMesh);

        let activeLane = (i % 2 === 0) ? -4.5 : 4.5;
        trafficCar.position.set(activeLane, 0, -100 - (i * 75));
        scene.add(trafficCar);
        
        enemies.push({
            mesh: trafficCar,
            speed: 0.5 + Math.random() * 0.4
        });
    }
}

// Generate Skyscrapers, Modern Buildings and Scenery (No More Empty Space)
function setupCitySkyline() {
    // High Definition Architecture Textures Generated via Color Shader Mat
    const bldColors = ['#cfd8dc', '#b0bec5', '#90a4ae', '#78909c', '#eceff1'];
    
    for (let i = 0; i > -2000; i -= 45) {
        // Left Side Skyscrapers
        const leftBldHeight = 25 + Math.random() * 35;
        const leftBldWidth = 10 + Math.random() * 8;
        const leftBldMat = new THREE.MeshStandardMaterial({ 
            color: bldColors[Math.floor(Math.random() * bldColors.length)], roughness: 0.4, metalness: 0.3 
        });
        const bldL = new THREE.Mesh(new THREE.BoxGeometry(leftBldWidth, leftBldHeight, 15), leftBldMat);
        bldL.position.set(-18 - leftBldWidth/2, leftBldHeight/2, i);
        scene.add(bldL);
        environmentObjects.push(bldL);

        // Right Side Skyscrapers
        const rightBldHeight = 25 + Math.random() * 35;
        const rightBldWidth = 10 + Math.random() * 8;
        const rightBldMat = new THREE.MeshStandardMaterial({ 
            color: bldColors[Math.floor(Math.random() * bldColors.length)], roughness: 0.4, metalness: 0.3 
        });
        const bldR = new THREE.Mesh(new THREE.BoxGeometry(rightBldWidth, rightBldHeight, 15), rightBldMat);
        bldR.position.set(18 + rightBldWidth/2, rightBldHeight/2, i + 15);
        scene.add(bldR);
        environmentObjects.push(bldR);

        // Interspersed Modern Roadside Trees
        const leafMat = new THREE.MeshStandardMaterial({ color: '#388e3c', roughness: 0.7 });
        const treeGeo = new THREE.SphereGeometry(2, 16, 16);
        
        const treeL = new THREE.Mesh(treeGeo, leafMat);
        treeL.position.set(-11, 2, i + 20);
        const treeR = treeL.clone();
        treeR.position.x = 11;
        
        scene.add(treeL, treeR);
        environmentObjects.push(treeL, treeR);
    }
}

// Universal Input API Configurations
function setupControlInteractions() {
    // Switch Controller Event Listener
    modeSwitcher.addEventListener('click', () => {
        if (controlMode === 'buttons') {
            controlMode = 'wheel';
            buttonControls.style.display = 'none';
            steeringWheel.style.display = 'block';
            keys.left = false; keys.right = false;
        } else {
            controlMode = 'buttons';
            buttonControls.style.display = 'flex';
            steeringWheel.style.display = 'none';
            wheelCurrentRotation = 0;
            steeringWheel.style.transform = `rotate(0deg)`;
        }
    });

    // Touch Steering Wheel Control Calculations
    function getTouchAngle(e) {
        const rect = steeringWheel.getBoundingClientRect();
        const centerW = rect.left + rect.width / 2;
        const centerH = rect.top + rect.height / 2;
        const touch = e.touches[0];
        return Math.atan2(touch.clientY - centerH, touch.clientX - centerW);
    }

    steeringWheel.addEventListener('touchstart', (e) => {
        e.preventDefault();
        wheelActive = true;
        wheelStartAngle = getTouchAngle(e) - wheelCurrentRotation;
    }, { passive: false });

    steeringWheel.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!wheelActive) return;
        let deltaAngle = getTouchAngle(e) - wheelStartAngle;
        
        // Clamp wheel rotation between -130 to +130 degrees max bounds
        wheelCurrentRotation = Math.max(-2.2, Math.min(2.2, deltaAngle));
        steeringWheel.style.transform = `rotate(${wheelCurrentRotation * 57.29}deg)`;
    }, { passive: false });

    const stopWheel = () => { wheelActive = false; };
    steeringWheel.addEventListener('touchend', stopWheel);
    steeringWheel.addEventListener('touchcancel', stopWheel);

    // Bind Standard Gas and Brake Pedals
    function bindPedal(id, prop) {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[prop] = true; }, { passive: false });
        el.addEventListener('touchend', (e) => { e.preventDefault(); keys[prop] = false; }, { passive: false });
        el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[prop] = false; }, { passive: false });
    }
    bindPedal('key-left', 'left');
    bindPedal('key-right', 'right');
    bindPedal('key-up', 'up');
    bindPedal('key-down', 'down');
}

function updatePhysics() {
    // Throttle Accel Calculation Matrix
    if (keys.up) speed += accel;
    else if (keys.down) speed += brk;
    else speed += decel;

    speed = Math.max(0, Math.min(speed, maxSpeed));

    // Calculate turning either from Button Mode or Steering Wheel Angle Mode
    let turnFactor = 0;
    if (controlMode === 'buttons') {
        if (keys.left) turnFactor = -1;
        if (keys.right) turnFactor = 1;
    } else {
        // Wheel returns smoothly to center when not actively grabbed
        if (!wheelActive) {
            wheelCurrentRotation *= 0.85;
            steeringWheel.style.transform = `rotate(${wheelCurrentRotation * 57.29}deg)`;
        }
        turnFactor = wheelCurrentRotation / 2.2; // Convert radians angle mapping to -1 / 1 factor
    }

    // Apply Steering Vector Position Displacement
    if (Math.abs(turnFactor) > 0.02 && playerCar.position.x >= -7.5 && playerCar.position.x <= 7.5) {
        playerCar.position.x += 0.22 * turnFactor * (speed / maxSpeed);
        playerCar.rotation.y = -0.2 * turnFactor; 
        playerCar.rotation.z = -0.1 * turnFactor; // Dynamic roll aerodynamics
    } else {
        playerCar.rotation.y *= 0.8;
        playerCar.rotation.z *= 0.8;
    }
    playerCar.position.x = Math.max(-7.5, Math.min(7.5, playerCar.position.x));

    // Handle Infinite Environment Motion Matrix Loops
    if (speed > 0) {
        score += Math.floor(speed * 15);
        
        environmentObjects.forEach(obj => {
            obj.position.z += speed * 30;
            if (obj.position.z > 25) obj.position.z -= 1900; // Reset back to infinite depth horizon
        });

        // Traffic Collision Logic
        enemies.forEach(enemy => {
            enemy.mesh.position.z += (speed * 30) - (enemy.speed * 26);
            
            if (Math.abs(playerCar.position.z - enemy.mesh.position.z) < 3.6 &&
                Math.abs(playerCar.position.x - enemy.mesh.position.x) < 1.8) {
                speed = 0.15; // Hit impact crash penalty
                enemy.mesh.position.z -= 10;
            }

            if (enemy.mesh.position.z > 25) {
                enemy.mesh.position.z = -450 - Math.random() * 200;
                enemy.mesh.position.x = Math.random() > 0.5 ? -4.5 : 4.5;
            }
        });
    }

    speedVal.innerText = Math.floor((speed / maxSpeed) * 335);
    scoreVal.innerText = score;
}

function animate() {
    requestAnimationFrame(animate);
    updatePhysics();
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// Backward Compatibility Desktop Keyboard
window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

init3D();
animate();
</script>
</body>
</html>
