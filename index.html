<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JJ racing game </title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
        }
        /* Full Screen 3D WebGL Webview */
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Neon HUD Overlay */
        #hud {
            position: absolute;
            top: 24px;
            left: 24px;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 12px;
            border: 2px solid #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }
        .hud-val { color: #00ffcc; }
        
        /* iPad Ergonomic Controller Overlay */
        .touch-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }
        .btn-side { display: flex; gap: 25px; pointer-events: auto; }
        .touch-btn {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #00ffcc;
            border-radius: 50%;
            color: #00ffcc;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .touch-btn:active { background: rgba(0, 255, 204, 0.4); box-shadow: 0 0 25px #00ffcc; }
        .btn-gas { border-color: #00ff66; color: #00ff66; }
        .btn-gas:active { background: rgba(0, 255, 102, 0.4); }
        .btn-brk { border-color: #ff0055; color: #ff0055; }
        .btn-brk:active { background: rgba(255, 0, 85, 0.4); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div>SPEED: <span id="speed-val" class="hud-val">0</span> KM/H</div>
        <div style="margin-top: 5px;">SCORE: <span id="score-val" class="hud-val">0</span></div>
    </div>

    <div id="gameCanvas"></div>

    <div class="touch-container">
        <div class="btn-side">
            <div class="touch-btn" id="key-left">◀</div>
            <div class="touch-btn" id="key-right">▶</div>
        </div>
        <div class="btn-side">
            <div class="touch-btn btn-brk" id="key-down">B</div>
            <div class="touch-btn btn-gas" id="key-up">GAS</div>
        </div>
    </div>

<script>
const speedVal = document.getElementById('speed-val');
const scoreVal = document.getElementById('score-val');

// 3D Engine Variables
let scene, camera, renderer;
let playerCar, road, sun, sky;
let enemies = [];
let environmentObjects = [];

let speed = 0;
const maxSpeed = 1.5;
const accel = 0.02;
const brk = -0.04;
const decel = -0.005;
let keys = { left: false, right: false, up: false, down: false };
let score = 0;

function init3D() {
    // 1. Create Scene & Sky Color
    scene = new THREE.Scene();
    scene.background = new THREE.Color('#87ceeb'); // Beautiful Sky Blue
    scene.fog = new THREE.FogExp2('#87ceeb', 0.015);

    // 2. Setup Camera Angle
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 7); // Positioned nicely behind the car
    camera.lookAt(0, 1, -5);

    // 3. WebGL Renderer Setup
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('gameCanvas').appendChild(renderer.domElement);

    // 4. Lighting System (Sunlight & Ambient)
    const ambientLight = new THREE.AmbientLight('#ffffff', 0.6);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight('#ffffd0', 1.2);
    sunLight.position.set(50, 80, 20);
    sunLight.castShadow = true;
    scene.add(sunLight);

    // 5. Create Beautiful Big Sun in the Sky
    const sunGeo = new THREE.SphereGeometry(4, 32, 32);
    const sunMat = new THREE.MeshBasicMaterial({ color: '#ffea00' });
    sun = new THREE.Mesh(sunGeo, sunMat);
    sun.position.set(40, 50, -150);
    scene.add(sun);

    buildTrack();
    buildPlayerCar();
    spawn3DEnemies();
    buildScenery();

    window.addEventListener('resize', onWindowResize, false);
}

// Build Realistic Asphalt 3D Road
function buildTrack() {
    const roadGeo = new THREE.PlaneGeometry(12, 1000);
    // Dark Asphalt Color with realistic specular highlights
    const roadMat = new THREE.MeshStandardMaterial({ color: '#222226', roughness: 0.8 });
    road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0, -450);
    scene.add(road);

    // Center White Divider Lines Grid
    for(let i = 0; i > -1000; i -= 15) {
        const lineGeo = new THREE.PlaneGeometry(0.3, 5);
        const lineMat = new THREE.MeshBasicMaterial({ color: '#ffffff' });
        const line = new THREE.Mesh(lineGeo, lineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.set(0, 0.01, i);
        scene.add(line);
        environmentObjects.push(line);
    }
}

// Assemble a Modern 3D Supercar using Geometries
function buildPlayerCar() {
    playerCar = new THREE.Group();

    // Main Body Frame (Glossy Red Paint)
    const bodyMat = new THREE.MeshStandardMaterial({ color: '#e60000', roughness: 0.2, metalness: 0.5 });
    const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 3.8), bodyMat);
    chassis.position.y = 0.3;
    playerCar.add(chassis);

    // Cabin Glass Greenhouse
    const cabinMat = new THREE.MeshStandardMaterial({ color: '#111115', roughness: 0.1 });
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.4, 1.8), cabinMat);
    cabin.position.set(0, 0.65, -0.2);
    playerCar.add(cabin);

    // Aerodynamic Rear Spoiler Wing
    const wing = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.05, 0.4), bodyMat);
    wing.position.set(0, 0.7, 1.7);
    playerCar.add(wing);

    const wingStrutL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.3, 0.1), bodyMat);
    wingStrutL.position.set(-0.8, 0.55, 1.7);
    playerCar.add(wingStrutL);

    const wingStrutR = wingStrutL.clone();
    wingStrutR.position.x = 0.8;
    playerCar.add(wingStrutR);

    // Glowing Neon Headlights (Cyan Front Lights)
    const lightMat = new THREE.MeshBasicMaterial({ color: '#00ffff' });
    const lightL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.1), lightMat);
    lightL.position.set(-0.7, 0.35, -1.9);
    playerCar.add(lightL);

    const lightR = lightL.clone();
    lightR.position.x = 0.7;
    playerCar.add(lightR);

    // 3D Wheel Hubs
    const wheelMat = new THREE.MeshStandardMaterial({ color: '#111111', roughness: 0.9 });
    const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 24);
    
    const positions = [
        [-0.95, 0.35, -1.1], // Front Left
        [0.95, 0.35, -1.1],  // Front Right
        [-0.95, 0.35, 1.1],  // Rear Left
        [0.95, 0.35, 1.1]    // Rear Right
    ];

    positions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(pos[0], pos[1], pos[2]);
        playerCar.add(wheel);
    });

    playerCar.position.set(0, 0, 0);
    scene.add(playerCar);
}

// Spawn Beautiful Colorful Enemy 3D Cars
function spawn3DEnemies() {
    const colors = ['#ffcc00', '#00ffcc', '#aa00ff', '#ff6600'];
    
    for (let i = 0; i < 6; i++) {
        const enemyGroup = new THREE.Group();
        const randColor = colors[Math.floor(Math.random() * colors.length)];
        
        const bodyMat = new THREE.MeshStandardMaterial({ color: randColor, roughness: 0.3 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.45, 3.6), bodyMat);
        body.position.y = 0.3;
        enemyGroup.add(body);

        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.4, 1.6), new THREE.MeshStandardMaterial({ color: '#111' }));
        cabin.position.set(0, 0.65, -0.1);
        enemyGroup.add(cabin);

        // Position them ahead down the track lanes
        let laneX = (i % 2 === 0) ? -3 : 3;
        enemyGroup.position.set(laneX, 0, -50 - (i * 60));
        
        scene.add(enemyGroup);
        enemies.push({
            mesh: enemyGroup,
            speed: 0.3 + Math.random() * 0.3,
            lane: laneX
        });
    }
}

// Create Trees and Environment Landscape alongside the road
function buildScenery() {
    const greenMat = new THREE.MeshStandardMaterial({ color: '#2e7d32', roughness: 0.9 });
    const trunkMat = new THREE.MeshStandardMaterial({ color: '#5d4037' });

    for (let i = 0; i > -1000; i -= 20) {
        // Left Side Trees
        const treeL = new THREE.Group();
        const trunkL = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2), trunkMat);
        trunkL.position.y = 1;
        const leavesL = new THREE.Mesh(new THREE.ConeGeometry(1.5, 3, 8), greenMat);
        leavesL.position.y = 3;
        treeL.add(trunkL, leavesL);
        treeL.position.set(-10, 0, i + Math.random() * 5);
        scene.add(treeL);
        environmentObjects.push(treeL);

        // Right Side Trees
        const treeR = treeL.clone();
        treeR.position.x = 10;
        scene.add(treeR);
        environmentObjects.push(treeR);
    }
}

function updateGame() {
    // Handling Speed Throttle Accel Physics
    if (keys.up) speed += accel;
    else if (keys.down) speed += brk;
    else speed += decel;

    speed = Math.max(0, Math.min(speed, maxSpeed));

    // Handle Steering
    if (keys.left && playerCar.position.x > -4.5) {
        playerCar.position.x -= 0.15 * (speed / maxSpeed);
        playerCar.rotation.y = 0.15; // Lean into drift left
    } else if (keys.right && playerCar.position.x < 4.5) {
        playerCar.position.x += 0.15 * (speed / maxSpeed);
        playerCar.rotation.y = -0.15; // Lean into drift right
    } else {
        playerCar.rotation.y = 0; // Straighten up
    }

    // Move Road Items & Environment backwards to simulate velocity
    if (speed > 0) {
        score += Math.floor(speed * 10);
        
        // Loop environments endlessly
        environmentObjects.forEach(obj => {
            obj.position.z += speed * 30;
            if (obj.position.z > 15) {
                obj.position.z -= 980; // Teleport back to far distance
            }
        });

        // AI Cars Logic & Progression loop
        enemies.forEach(enemy => {
            enemy.mesh.position.z += (speed * 30) - (enemy.speed * 20);
            
            // Core Crash Detection bounding box check
            if (Math.abs(playerCar.position.z - enemy.mesh.position.z) < 3.5 &&
                Math.abs(playerCar.position.x - enemy.mesh.position.x) < 1.6) {
                speed = 0.1; // Total velocity crash hit
                enemy.mesh.position.z -= 5; 
            }

            // Recycle AI vehicle when passed behind player screen
            if (enemy.mesh.position.z > 15) {
                enemy.mesh.position.z = -350 - Math.random() * 100;
                enemy.mesh.position.x = Math.random() > 0.5 ? -3 : 3;
            }
        });
    }

    // Connect Engine variables to HUD
    speedVal.innerText = Math.floor((speed / maxSpeed) * 320);
    scoreVal.innerText = score;
}

function animate() {
    requestAnimationFrame(animate);
    updateGame();
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// Touch Mobile Controller Links
function bindTouch(id, prop) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[prop] = true; }, { passive: false });
    el.addEventListener('touchend', (e) => { e.preventDefault(); keys[prop] = false; }, { passive: false });
    el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[prop] = false; }, { passive: false });
}
bindTouch('key-left', 'left');
bindTouch('key-right', 'right');
bindTouch('key-up', 'up');
bindTouch('key-down', 'down');

// Backward Compatibility Keyboard Bindings
window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

// Boot Master Session
init3D();
animate();
</script>
</body>
</html>
